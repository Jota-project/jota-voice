gateway:
  # Opción A: host + port + path (WebSocket directo, sin proxy)
  host: "green-house"
  port: 8004
  path: "/ws/stream"
  # Opción B: url completa (proxy inverso / túnel). Si se define, tiene
  # prioridad sobre host/port/path — bórralos si usas esta opción.
  # url: "wss://tu-dominio.com/api/gateway/ws/stream"
  client_key: "RELLENAR"
  connect_timeout_s: 10

device:
  id: "mi-dispositivo"

oww:
  backend: "wyoming"          # único backend en fase 1
  host: "127.0.0.1"           # localhost en Mac y en Termux
  port: 10401
  wake_words:
    - "ok_nabu"
  reconnect_backoff_s: [5, 10, 20, 60]

audio:
  backend: null               # null = auto-detect por SO
  sample_rate: 16000
  channels: 1
  frames_per_buffer: 512
  preroll_seconds: 1.5
  silence_timeout_s: 1.5
  recording_timeout_s: 15.0
  vad_rms_threshold: 200
  input_device: null          # solo sounddevice
  output_device: null         # solo sounddevice

display:
  backend: null               # null = "http" si url, si no "null"
  url: "http://127.0.0.1:8766"
  timeout_s: 2.0

hosts:
  - ip: "192.168.X.X"
    name: "mi-servidor"
  - ip: "192.168.X.X"
    name: "mi-asistente"

logging:
  level: "INFO"

control:
  port: 8765
